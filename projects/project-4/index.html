<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyart Illustration Preview</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #0d0d0d;
            color: #ffffff;
            font-family: Arial, sans-serif;
            padding: 24px;
        }

        main {
            width: min(100%, 1100px);
            text-align: center;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
        }

        a {
            display: inline-block;
            margin-bottom: 18px;
            color: #e0a631;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <a href="../../index.html">← Back to portfolio</a>
        <img src="polyart.png" alt="Polyart Illustration preview">
    </main>
</body>
</html>

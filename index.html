<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(140deg, #FFA500, #FF6B9D);
            animation: gradient 5s infinite;
        }
        @keyframes gradient {
            0% { background-position: 0%; }
            50% { background-position: 100%; }
            100% { background-position: 0%; }
        }
        .cursor {
            width: 15px;
            height: 15px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            transition: background 0.3s ease;
        }
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        nav a {
            color: #333;
            text-decoration: none;
            margin: 0 20px;
        }
        .hero {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin: 10px;
        }
        .portfolio-section {
            display: flex;
            justify-content: space-around;
            margin: 50px 0;
        }
        .skills {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 50px 0;
        }
        .contact {
            margin: 50px 0;
            text-align: center;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
        }
        .social-links a {
            margin: 0 10px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="cursor"></div>
    <nav>
        <div class="logo">My Portfolio</div>
        <div class="links">
            <a href="#about">About</a>
            <a href="#portfolio">Portfolio</a>
            <a href="#skills">Skills</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <div class="card"><h1>Welcome to My Portfolio</h1></div>
    </section>

    <section id="portfolio" class="portfolio-section">
        <div class="card">UI/UX Design</div>
        <div class="card">Graphic Design</div>
        <div class="card">Web Development</div>
    </section>

    <section id="skills" class="skills">
        <div class="card">HTML</div>
        <div class="card">CSS</div>
        <div class="card">JavaScript</div>
    </section>

    <section id="contact" class="contact">
        <h2>Contact Me</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" value="ketankini0708@gmail.com" required>
            <input type="tel" placeholder="Your Phone" value="+91 95298 60298" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>
        <p>Email: ketankini0708@gmail.com</p>
        <p>Phone: +91 95298 60298</p>
        <p>Instagram: @keee_7_</p>
    </section>

    <footer>
        <div class="social-links">
            <a href="#">Instagram</a>
            <a href="#">LinkedIn</a>
            <a href="#">GitHub</a>
        </div>
        <audio id="click-sound">
            <source src="click-sound.mp3" type="audio/mpeg">
        </audio>
    </footer>

    <script>
        document.addEventListener('mousemove', function(e) {
            const cursor = document.querySelector('.cursor');
            cursor.style.top = e.clientY + 'px';
            cursor.style.left = e.clientX + 'px';
        });
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('click-sound').play();
            });
        });
    </script>
</body>
</html>
